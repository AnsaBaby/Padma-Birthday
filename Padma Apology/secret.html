<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💖</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(to bottom, #ffe4e6, #fecdd3);
      text-align: center;
      padding: 40px;
    }

    .fade {
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(20px); }
    }
  </style>
</head>

<body>
<a href="index.html"
   class="fixed bottom-6 right-6 bg-pink-500 text-white px-5 py-3 rounded-full shadow-lg hover:bg-pink-600 hover:scale-105 transition-transform z-50">
   🏠
</a>
<h1 class="text-3xl sm:text-4xl text-pink-600 font-bold fade">
  You said yes… 🥺💖
</h1>

<p class="mt-6 max-w-xl mx-auto text-gray-700 text-base sm:text-lg fade" style="animation-delay:1s;">
  Thank you for forgiving me…  
  I’m so lucky to have you in my life.  

  No matter what happens, I’ll always choose you. 💖
</p>

<img src="images/special.jpg"
  class="mx-auto mt-8 rounded-xl shadow-lg fade w-full max-w-sm"
  style="animation-delay:2s;">

<p class="mt-6 text-pink-700 text-lg sm:text-xl fade" style="animation-delay:3s;">
  Happy Birthday 🎂💖
</p>

</body>
</html>
